# Milestone 3 — catalog + environment + gateway with group-based access.
#   - ConfigMap:      declares all available MCP servers (duckduckgo, github, team-a-granola, team-b-notion).
#   - MCPEnvironment: binds the catalog into the gateway runtime.
# Pipeline: managed via .github/workflows/deploy-team-a.yml (push to main triggers apply).
#   - MCPGateway:     activates servers and enforces group-scoped visibility via policies.rules.
#
# Server names are team-prefixed to prevent collisions when multiple teams add servers.
# A server named "team-a-granola" exposes tools as "team-a-granola__<tool>".
#
# Server visibility (all authenticated users see duckduckgo + github):
#   duckduckgo      — everyone (no role restriction)
#   github          — everyone (no role restriction; per-user PAT injected from Key Vault)
#   team-a-granola  — mcp-team-a only; OAuth PKCE via gateway broker
#   team-b-notion   — mcp-team-b only; OAuth PKCE via gateway broker
#
# Apply after the MCPServer pods are Running.
# NOTE: after applying this file for the first time (or when the catalog ConfigMap changes),
# restart the control plane to pick up the new catalog entries:
#   oc rollout restart deploy/mcp-gw-cp -n mcp-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-catalog
  namespace: mcp-gateway
data:
  catalog.yaml: |
    name: pov-catalog
    displayName: PoV MCP Catalog
    registry:
      duckduckgo:
        name: duckduckgo
        title: DuckDuckGo Search
        description: Public web search — no upstream authentication
        type: remote
        remote:
          url: http://mcp-duckduckgo:8080/mcp
          transport_type: streamable-http
        allowHosts:
          - api.duckduckgo.com:443

      github:
        name: github
        title: GitHub
        description: GitHub repository access — issues, PRs, code search
        type: remote
        auth_delegation: gateway
        remote:
          url: http://mcp-github.mcp-gateway.svc.cluster.local:8080/mcp
          transport_type: streamable-http
        allowHosts:
          - api.github.com:443

      team-a-granola:
        name: team-a-granola
        title: Granola (Team A)
        description: Granola meeting notes — managed by team-a
        type: remote
        auth_delegation: gateway
        remote:
          url: https://mcp.granola.ai/mcp
          transport_type: streamable-http
        oauth:
          providers:
            - provider: granola
        tools:
          - name: list_meetings
            description: List recent meeting notes from Granola for the authenticated user.
            inputSchema:
              type: object
              properties:
                limit:
                  type: integer
                  description: Maximum number of meetings to return (default 10).
          - name: get_meeting
            description: Retrieve a single meeting's full notes by meeting id.
            inputSchema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Granola meeting id.
        allowHosts:
          - mcp.granola.ai:443
          - api.granola.ai:443

      team-b-notion:
        name: team-b-notion
        title: Notion (Team B)
        description: Notion workspace access — managed by team-b
        type: remote
        auth_delegation: gateway
        remote:
          url: https://mcp.notion.com/mcp
          transport_type: streamable-http
        oauth:
          providers:
            - provider: notion
        tools:
          - name: search
            description: Search pages and databases across the user's Notion workspace.
            inputSchema:
              type: object
              properties:
                query:
                  type: string
                  description: Text to search for.
                filter:
                  type: object
                  description: Optional filter by object type (page or database).
          - name: retrieve_a_page
            description: Retrieve a Notion page and its properties by page ID.
            inputSchema:
              type: object
              required: [page_id]
              properties:
                page_id:
                  type: string
                  description: The Notion page ID.
          - name: create_a_page
            description: Create a new page in a Notion workspace or as a child of an existing page or database.
            inputSchema:
              type: object
              required: [parent, properties]
              properties:
                parent:
                  type: object
                  description: Parent page or database object.
                properties:
                  type: object
                  description: Page property values.
          - name: retrieve_block_children
            description: List all child blocks of a page or block.
            inputSchema:
              type: object
              required: [block_id]
              properties:
                block_id:
                  type: string
                  description: The block (or page) ID whose children to retrieve.
          - name: append_block_children
            description: Append new content blocks to a Notion page or block.
            inputSchema:
              type: object
              required: [block_id, children]
              properties:
                block_id:
                  type: string
                  description: The block (or page) ID to append content to.
                children:
                  type: array
                  description: Array of block objects to append.
        allowHosts:
          - mcp.notion.com:443
          - api.notion.com:443
---
apiVersion: mcp.docker.com/v1alpha1
kind: MCPEnvironment
metadata:
  name: pov-env
  namespace: mcp-gateway
spec:
  inlineCatalogs:
    - configMapRef:
        name: mcp-catalog
        key: catalog.yaml
---
apiVersion: mcp.docker.com/v1alpha1
kind: MCPGateway
metadata:
  name: pov-gateway
  namespace: mcp-gateway
spec:
  environmentRef: pov-env
  displayName: "PoV Gateway"
  # open: mcp-find/mcp-add/mcp-remove are suppressed in the default all+closed
  # mode (nothing to discover — everything is pre-loaded). Setting open makes
  # them available so agents can search and activate catalog entries dynamically.
  discoveryMode: open
  serverNames:
    - duckduckgo
    - github
    - team-a-granola
    - team-b-notion
  policies:
    rules:
      # --- servers (all authenticated users) ---
      - serverName: duckduckgo
        effect: allow
        reason: "DuckDuckGo available to all authenticated users"
      - serverName: github
        effect: allow
        reason: "GitHub available to all authenticated users"

      # --- team-a ---
      # Only principals with the mcp-team-a role can load or invoke team-a-granola tools.
      - serverName: team-a-granola
        role: mcp-team-a
        effect: allow
        reason: "team-a-granola is visible only to mcp-team-a members"

      # --- team-b ---
      # Only principals with the mcp-team-b role can load or invoke team-b-notion tools.
      - serverName: team-b-notion
        role: mcp-team-b
        effect: allow
        reason: "team-b-notion is visible only to mcp-team-b members"

      # --- OAuth primordial tools (role-scoped, mirrors server access rules) ---
      # invokePrimordial is a distinct action not matched by serverName rules.
      # With flip-to-deny active any unmatched primordial is blocked, so OAuth
      # authorize and revoke-auth tools must be explicitly allowed per role.
      # Primordial names mirror the server name: "{serverName}-authorize".
      - action: invokePrimordial
        toolName: team-a-granola-authorize
        role: mcp-team-a
        effect: allow
        reason: "Granola OAuth flow — mcp-team-a members only"
      - action: invokePrimordial
        toolName: team-a-granola-revoke-auth
        role: mcp-team-a
        effect: allow
        reason: "Granola token revocation — mcp-team-a members only"
      - action: invokePrimordial
        toolName: team-b-notion-authorize
        role: mcp-team-b
        effect: allow
        reason: "Notion OAuth flow — mcp-team-b members only"
      - action: invokePrimordial
        toolName: team-b-notion-revoke-auth
        role: mcp-team-b
        effect: allow
        reason: "Notion token revocation — mcp-team-b members only"

      # --- all other primordials (all authenticated users) ---
      # Flip-to-deny requires explicit allows once any invokePrimordial rule exists.
      # All 6 primordial tools are allowed for every authenticated user.
      - action: invokePrimordial
        toolName: mcp-find
        effect: allow
      - action: invokePrimordial
        toolName: mcp-add
        effect: allow
      - action: invokePrimordial
        toolName: mcp-remove
        effect: allow
      - action: invokePrimordial
        toolName: mcp-config-set
        effect: allow
      - action: invokePrimordial
        toolName: mcp-exec
        effect: allow
      - action: invokePrimordial
        toolName: code-mode
        effect: allow
